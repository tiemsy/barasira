; Keep native PHP and PHP-FPM errors available to the superadmin log viewer.
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log
display_errors = Off

; Laravel accepts supporting documents up to 10 MB. Keep enough room for
; multipart/form-data overhead while retaining an infrastructure-level cap.
upload_max_filesize = 12M
post_max_size = 15M
