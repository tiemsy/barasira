  </g>

  <!-- Tombouctou -->
  <g id="tombouctou" class="city" data-city="Tombouctou" data-lat="16.7735" data-ng="-3.0074">
    <circle cx="415" cy="170" r="10" />
    <text x="310" y="175">Tombouctou</text>
  </g>

  <!-- Gao -->
  <g id="gao" class="city" data-city="Gao" data-lat="16.2667" data-ng="-0.0500">
    <circle cx="520" cy="230" r="10" />
    <text x="510" y="210">Gao</text>
  </g>
