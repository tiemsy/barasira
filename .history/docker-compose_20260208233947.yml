version: "3.9"

services:
    barasira_php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        container_name: barasira_php
        volumes:
            - ./:/var/www
        networks:
            - barasira
        depends_on:
            - barasira_db

    nginx:
        image: nginx:latest
        container_name: barasira_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - barasira
        depends_on:
            - barasira_php

    node:
        build:
            context: .
            dockerfile: ./docker/node/Dockerfile
        container_name: barasira_node
        ports:
            - "5173:5173"
        volumes:
            - ./:/app
        networks:
            - barasira

    barasira_db:
        image: mysql:8
        container_name: barasira_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: barasira
            MYSQL_USER: barasira
            MYSQL_PASSWORD: barasira
        ports:
            - "3306:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - barasira

networks:
    barasira:

volumes:
    dbdata:
