# docker-compose.prod.yuml

version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    networks:
      - barasira

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - php
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.barasira.rule=Host(`barasira.com`)
      - traefik.http.services.barasira.loadbalancer.server.port=80
    networks:
      - barasira

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: barasira
      MYSQL_USER: barasira
      MYSQL_PASSWORD: barasira
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - barasira

  node:
    image: node:20
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run build"
    ports:
      - "5173:5173"

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - barasira

networks:
  barasira:

volumes:
  dbdata:
