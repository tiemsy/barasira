# docker-compose.prod.yml
#
# Architecture: single image containing nginx + php-fpm + horizon (via supervisor).
# All build artefacts (vendor, public/build) are baked into the image via the
# multi-stage Dockerfile, so no host volume mounts are needed and redeploys
# always start from a clean, complete image.

version: "3.9"

services:
  # Single container exposing port 80. Service name kept as `nginx` to keep
  # compatibility with the SERVICE_FQDN_NGINX env var Coolify already routes to.
  nginx:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    expose:
      - "80"
    depends_on:
      - db
      - redis
    networks:
      - barasira
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    expose:
      - "9000"
    networks:
      - barasira
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: barasira
      MYSQL_USER: barasira
      MYSQL_PASSWORD: barasira
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - barasira

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - barasira

networks:
  barasira:

volumes:
  dbdata:
