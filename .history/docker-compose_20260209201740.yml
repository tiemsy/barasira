# docker-compose.yml

version: "3.9"

services:
    barasira_php:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
            target: barasira_php
        container_name: barasira_php
        volumes:
            - ./:/var/www/html
        networks:
            - barasira
        depends_on:
            - barasira_db
            - barasira_redis

    barasira_nginx:
        image: nginx:stable-alpine
        container_name: barasira_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - barasira
        depends_on:
            - barasira_php

    barasira_node:
        build:
            context: .
            dockerfile: ./docker/node/Dockerfile.dev
        container_name: barasira_node
        working_dir: /var/www/html
        ports:
            - "5173:5173"
        volumes:
            #   - ./:/app
            - ./:/var/www/html
            - node_modules:/var/www/html/node_modules
        networks:
            - barasira

    barasira_db:
        image: mysql:8.0
        container_name: barasira_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: barasira
            MYSQL_USER: barasira
            MYSQL_PASSWORD: barasira
        ports:
            - "3306:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - barasira
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10
    barasira_phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: barasira_phpmyadmin
        restart: always
        ports:
            - "8081:80"
        environment:
            PMA_HOST: barasira_db
            PMA_USER: root
            PMA_PASSWORD: root
            PMA_PORT: 3306
        depends_on:
            - barasira_db
        networks:
            - barasira

    barasira_redis:
        image: redis:7.2
        container_name: barasira_redis
        restart: always
        ports:
            - "6379:6379"
        networks:
            - barasira

    barasira_mailpit:
        image: axllent/mailpit:latest
        container_name: barasira_mailpit
        ports:
            - "8025:8025"
            - "1025:1025"
        networks:
            - barasira

    ngrok:
        image: ngrok/ngrok:latest
        container_name: barasira_ngrok
        command: http barasira_nginx:80
        environment:
            NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
        ports:
            - "4040:4040"
        depends_on:
            - barasira_nginx

networks:
    barasira:

volumes:
    dbdata:
    node_modules:
