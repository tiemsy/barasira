app.barasira.com {
    root * /var/www/barasira/public
    php_fastcgi unix//run/php/php-fpm.sock
    encode gzip zstd
    file_server
    try_files {path} {path}/ /index.php?{query}
}

api.barasira.com {
    root * /var/www/barasira/public
    php_fastcgi unix//run/php/php-fpm.sock
    encode gzip zstd

    import ./rate-limit.conf
    import ./cache.conf

    try_files {path} {path}/ /index.php?{query}
}
