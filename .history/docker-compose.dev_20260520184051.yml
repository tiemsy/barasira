version: "3.9"

services:
  barasira_nginx:
    ports:
      - "8080:80"

  barasira_php:
    volumes:
      - ./:/var/www/html

  barasira_node:
    image: node:20
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"

  barasira_phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - barasira_db

  barasira_mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  node_modules:
