version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-superadmin@barasira.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_PHONE: ${SUPERADMIN_PHONE:-+22370000000}
      SUPERADMIN_FIRST_NAME: ${SUPERADMIN_FIRST_NAME:-Super}
      SUPERADMIN_LAST_NAME: ${SUPERADMIN_LAST_NAME:-Admin}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: barasira
      DB_USERNAME: barasira
      DB_PASSWORD: barasira
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    expose:
      - "80"
    depends_on:
      - db
      - redis
    networks:
      - barasira

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: barasira
      MYSQL_USER: barasira
      MYSQL_PASSWORD: barasira
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - barasira

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - barasira

networks:
  barasira:

volumes:
  dbdata:
