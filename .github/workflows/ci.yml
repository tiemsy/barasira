name: Barasira CI

on:
  push:
    branches: [ master, staging ]
  pull_request:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: barasira
      DB_USERNAME: barasira
      DB_PASSWORD: barasira

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: barasira
          MYSQL_USER: barasira
          MYSQL_PASSWORD: barasira
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ubarasira -pbarasira"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, gd, zip

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build front assets (Vite)
        run: npm run build

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
