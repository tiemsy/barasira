name: Barasira CI

on:
  push:
    branches:
      - master
      - staging

  pull_request:
    branches:
      - master
      - staging

permissions:
  contents: read
  pull-requests: read

jobs:
  laravel-tests:
    name: Tests et analyse SonarCloud
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: barasira
      DB_USERNAME: barasira
      DB_PASSWORD: barasira

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: barasira
          MYSQL_USER: barasira
          MYSQL_PASSWORD: barasira
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ubarasira -pbarasira"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du projet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, gd, zip
          coverage: pcov
          tools: composer:v2

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copier le fichier d'environnement
        run: cp .env.example .env

      - name: Générer la clé Laravel
        run: php artisan key:generate

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances npm
        run: npm ci

      - name: Compiler les assets Vite
        run: npm run build

      - name:Exécuter les migrations et les seeders
        run: php artisan migrate --force

      - name: Run seeders
        if: github.ref == 'refs/heads/staging' || github.event_name == 'pull_request'
        run: php artisan db:seed --force

      - name: Exécuter les tests avec couverture
        run: php artisan test --coverage-clover=coverage.xml

      - name: Vérifier la présence du rapport de couverture
        run: test -f coverage.xml

      - name: Analyse SonarCloud
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=app,routes,resources/js
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=vendor/**,node_modules/**,storage/**,bootstrap/cache/**,public/build/**
            -Dsonar.coverage.exclusions=database/**,config/**,routes/**,resources/js/**/*
            -Dsonar.qualitygate.wait=true

